<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bolão do Bolero (Duda)</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="description" content="Bolão da Copa do Mundo 2026" />
    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- A aplicação NÃO é PWA. Remove qualquer service worker legado (e seus caches)
         que ainda esteja servindo versões antigas do app no navegador do usuário. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (!regs.length) return
          regs.forEach(function (r) { r.unregister() })
          if (window.caches && caches.keys) {
            caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k) }) })
          }
          // Se um SW ainda controla esta página, recarrega UMA vez para sair do controle.
          if (navigator.serviceWorker.controller && !sessionStorage.getItem('sw-removido')) {
            sessionStorage.setItem('sw-removido', '1')
            location.reload()
          }
        }).catch(function () {})
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
