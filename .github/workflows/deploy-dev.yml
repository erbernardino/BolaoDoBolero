name: Deploy Teste

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-teste
  cancel-in-progress: true

jobs:
  deploy:
    name: Build e Deploy (bolao-do-bolero-teste)
    runs-on: ubuntu-latest
    environment: teste
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências (web)
        run: npm ci

      - name: Instalar dependências (functions)
        run: npm ci --prefix functions

      - name: Build web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
        run: npm run build

      - name: Build functions
        run: npm run build --prefix functions

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools@14.1.0

      - name: Deploy Firebase (hosting + rules + indexes + functions)
        run: firebase deploy --only hosting,firestore,functions --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive --force
